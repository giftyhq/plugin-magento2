name: PHP Checks

on:
  pull_request:
    branches: [main]

env:
  COMPOSER_AUTH: >-
    {"http-basic": {"repo.magento.com": {"username": "${{ secrets.MAGENTO_PUBLIC_KEY }}", "password": "${{ secrets.MAGENTO_PRIVATE_KEY }}"}}}

jobs:
  lint:
    name: Lint PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Composer Validate
        run: composer validate --strict

      - name: PHP Lint
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

  phpcs:
    name: Magento Coding Standard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHPCS
        run: vendor/bin/phpcs

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress
